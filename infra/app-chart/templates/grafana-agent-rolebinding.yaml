{{- if .Values.grafanaAgent.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "hivebox.fullname" . }}-grafana-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hivebox.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana-agent
subjects:
  - kind: ServiceAccount
    name: {{ include "hivebox.fullname" . }}-grafana-agent
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "hivebox.fullname" . }}-grafana-agent
{{- end }}
