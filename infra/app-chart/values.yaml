replicaCount: 2

image:
  repository: hivebox
  tag: v0.1.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix

minio:
  endpoint: minio:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucket: hivebox
  secure: "false"
  createBucket: "true"

valkey:
  host: valkey
  port: 6379
  ssl: "false"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

networkPolicy:
  enabled: true
